<h1>Detection History</h1>

<table border="1">
<tr>
    <th>ID</th>
    <th>Data</th>
    <th>Result</th>
    <th>Confidence</th>
    <th>Type</th>
</tr>

{% for row in data %}
<tr>
    <td>{{ row[0] }}</td>
    <td>{{ row[1] }}</td>
    <td>{{ row[2] }}</td>
    <td>{{ row[3] }}%</td>
    <td>{{ row[4] }}</td>
</tr>
{% endfor %}
</table>

<a href="/">Go Back</a>
